
Then your action becomes:

```yaml
on:
  push:
    branches: [ main ]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Build backend branch
        run: |
          git checkout --orphan backend-deploy

          cp -r backend/* .

          rm -rf backend frontend .git

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git init

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .
          git commit -m "Deploy backend"

          git remote add hf https://mockingjay-7:$HF_TOKEN@huggingface.co/spaces/mockingjay-7/neurogan-backend

          git push --force hf HEAD:main